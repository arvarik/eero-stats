name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Because eero-go is a relative local module in this workspace structure, 
      # we need to checkout that repository alongside eero-stats to satisfy go.mod
      # In a real deployed setup, if they are separate repos, you'd clone both.
      # Assuming eero-go is located one directory up relative to eero-stats in the monorepo:
      - name: Checkout eero-go
        uses: actions/checkout@v4
        with:
          repository: arvarik/eero-go
          path: ../eero-go

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Tidy dependencies
        run: go mod tidy
        working-directory: .

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: .
          args: --timeout=5m
